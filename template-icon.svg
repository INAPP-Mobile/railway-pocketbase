<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)" rx="160"/>
  <!-- PocketBase stylized P logo -->
  <g transform="translate(400, 400)">
    <!-- Database cylinder shape -->
    <ellipse cx="0" cy="-60" rx="140" ry="50" fill="#3b82f6" opacity="0.15"/>
    <rect x="-140" y="-60" width="280" height="200" rx="0" fill="#3b82f6" opacity="0.15"/>
    <ellipse cx="0" cy="140" rx="140" ry="50" fill="#3b82f6" opacity="0.2"/>
    <!-- P letter -->
    <path d="M-50,-100 L-50,160 M-50,-100 L30,-100 Q80,-100 80,-50 Q80,0 30,0 L-50,0" 
          fill="none" stroke="#3b82f6" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Database rows -->
    <line x1="-100" y1="-20" x2="90" y2="-20" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="-100" y1="20" x2="60" y2="20" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="-100" y1="60" x2="40" y2="60" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="-100" y1="100" x2="70" y2="100" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
