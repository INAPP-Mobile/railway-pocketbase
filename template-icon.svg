<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
    <linearGradient id="diskTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Decorative ring -->
  <circle cx="400" cy="400" r="190" stroke="#2563EB" stroke-width="2" opacity="0.2"/>
  <!-- Database stack -->
  <g transform="translate(400,380)">
    <!-- Disk 3 (bottom) -->
    <rect x="-130" y="60" width="260" height="40" rx="4" fill="url(#disk)" opacity="0.5"/>
    <ellipse cx="0" cy="100" rx="130" ry="20" fill="url(#disk)" opacity="0.4"/>
    <ellipse cx="0" cy="60" rx="130" ry="20" fill="#3B82F6" opacity="0.2"/>
    <!-- Disk 2 (middle) -->
    <rect x="-130" y="0" width="260" height="40" rx="4" fill="url(#disk)" opacity="0.7"/>
    <ellipse cx="0" cy="40" rx="130" ry="20" fill="url(#disk)" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="130" ry="20" fill="url(#diskTop)" opacity="0.35"/>
    <!-- Disk 1 (top) -->
    <rect x="-130" y="-60" width="260" height="40" rx="4" fill="url(#disk)" opacity="0.9"/>
    <ellipse cx="0" cy="-20" rx="130" ry="20" fill="url(#disk)" opacity="0.8"/>
    <ellipse cx="0" cy="-60" rx="130" ry="20" fill="url(#diskTop)" opacity="0.55"/>
    <!-- Top disk indicator lights -->
    <circle cx="-40" cy="-60" r="5" fill="#93C5FD" opacity="0.7"/>
    <circle cx="0" cy="-60" r="5" fill="#93C5FD" opacity="0.5"/>
    <circle cx="40" cy="-60" r="5" fill="#93C5FD" opacity="0.3"/>
  </g>
  <!-- Accent -->
  <circle cx="180" cy="200" r="6" fill="#3B82F6" opacity="0.35"/>
  <circle cx="620" cy="580" r="7" fill="#60A5FA" opacity="0.3"/>
</svg>