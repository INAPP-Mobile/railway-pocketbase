<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Database stack -->
  <g transform="translate(400,400)">
    <!-- Disk 3 (bottom) -->
    <rect x="-180" y="70" width="360" height="50" rx="6" fill="#FFFFFF" opacity="0.4"/>
    <ellipse cx="0" cy="120" rx="180" ry="28" fill="#FFFFFF" opacity="0.25"/>
    <!-- Disk 2 (middle) -->
    <rect x="-180" y="0" width="360" height="50" rx="6" fill="#FFFFFF" opacity="0.7"/>
    <ellipse cx="0" cy="50" rx="180" ry="28" fill="#FFFFFF" opacity="0.5"/>
    <!-- Disk 1 (top) -->
    <rect x="-180" y="-70" width="360" height="50" rx="6" fill="#FFFFFF"/>
    <ellipse cx="0" cy="-20" rx="180" ry="28" fill="#FFFFFF"/>
    <!-- Top disk lights -->
    <circle cx="-60" cy="-70" r="8" fill="#2563EB"/>
    <circle cx="0" cy="-70" r="8" fill="#2563EB"/>
    <circle cx="60" cy="-70" r="8" fill="#2563EB"/>
  </g>
</svg>