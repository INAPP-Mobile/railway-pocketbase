<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="300" fill="#3b82f6" opacity="0.04"/>
  <circle cx="200" cy="500" r="250" fill="#3b82f6" opacity="0.04"/>
  <!-- P logo -->
  <g transform="translate(200, 315)">
    <ellipse cx="0" cy="-40" rx="80" ry="30" fill="#3b82f6" opacity="0.15"/>
    <rect x="-80" y="-40" width="160" height="115" rx="0" fill="#3b82f6" opacity="0.15"/>
    <ellipse cx="0" cy="75" rx="80" ry="30" fill="#3b82f6" opacity="0.2"/>
    <path d="M-30,-60 L-30,90 M-30,-60 L20,-60 Q50,-60 50,-30 Q50,0 20,0 L-30,0" 
          fill="none" stroke="#3b82f6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="340" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">PocketBase</text>
  <text x="340" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="0">Open Source Backend as a Service</text>
  <!-- Railway badge -->
  <rect x="340" y="380" width="160" height="36" rx="18" fill="#3b82f6" opacity="0.15"/>
  <text x="420" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="600">Railway Template</text>
  <!-- Feature tags -->
  <rect x="520" y="380" width="110" height="36" rx="18" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="575" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">SQLite</text>
  <rect x="640" y="380" width="110" height="36" rx="18" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="695" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Realtime</text>
  <rect x="760" y="380" width="110" height="36" rx="18" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="815" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Auth</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#3b82f6" opacity="0.08"/>
  <text x="600" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b" text-anchor="middle" letter-spacing="2">DEPLOY IN ONE CLICK ON RAILWAY</text>
</svg>
